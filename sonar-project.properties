# SonarCloud Configuration
sonar.projectKey=juramal_user-management-backend
sonar.organization=juramal

# Project Information
sonar.projectName=User Management Backend
sonar.projectVersion=1.0

# Source and Test Paths
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.spec.ts

# TypeScript Configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage Configuration
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**

# Source Encoding
sonar.sourceEncoding=UTF-8
